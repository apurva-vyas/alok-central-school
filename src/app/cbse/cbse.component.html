<section class="cbse-section section-padding">
  <div class="site-container">
    <h1 class="page-title" appReveal="fade-up">CBSE Information</h1>
    <p class="section-subtitle" appReveal="fade-up" [revealDelay]="100">Access all mandatory CBSE disclosure documents below. Click any document to view it.</p>
    <div class="docs-grid">
      <a *ngFor="let doc of documents; let i = index" class="doc-card card-custom"
         appReveal="scale-up" [revealDelay]="(i % 4) * 100"
         (click)="openPdfInNewTab(doc.src, doc.name)" role="button" tabindex="0">
        <app-icon name="pdf" [size]="28"></app-icon>
        <span>{{ doc.name }}</span>
      </a>
    </div>
  </div>
</section>
