<app-page-hero [image]="cbseHero" title="CBSE Information"></app-page-hero>

<section class="cbse-section section-padding">
  <div class="site-container">
    <p class="section-subtitle">Access all mandatory CBSE disclosure documents below. Click any document to view it.</p>
    <div class="docs-grid">
      <a *ngFor="let doc of documents" class="doc-card card-custom"
         (click)="openPdfInNewTab(doc.src, doc.name)" role="button" tabindex="0">
        <app-icon name="pdf" [size]="28"></app-icon>
        <span>{{ doc.name }}</span>
      </a>
    </div>
  </div>
</section>
