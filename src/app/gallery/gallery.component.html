<app-page-hero [image]="galleryHero" title="Photo Gallery"></app-page-hero>

<section class="gallery-section section-padding">
  <div class="site-container">

    <!-- Filter Buttons -->
    <div class="filter-bar">
      <button class="filter-btn" [class.active]="activeFilter === 'all'"
              (click)="filterImages('all'); activeFilter='all'">All</button>
      <button class="filter-btn" [class.active]="activeFilter === 'school trip'"
              (click)="filterImages('school trip'); activeFilter='school trip'">School Trip</button>
      <button class="filter-btn" [class.active]="activeFilter === 'Janmashthami'"
              (click)="filterImages('Janmashthami'); activeFilter='Janmashthami'">Janmashthami</button>
      <button class="filter-btn" [class.active]="activeFilter === 'News Clips'"
              (click)="filterImages('News Clips'); activeFilter='News Clips'">News Clips</button>
      <button class="filter-btn" [class.active]="activeFilter === 'science fair'"
              (click)="filterImages('science fair'); activeFilter='science fair'">Science Fair</button>
      <button class="filter-btn" [class.active]="activeFilter === 'Annual Function'"
              (click)="filterImages('Annual Function'); activeFilter='Annual Function'">Annual Function</button>
    </div>

    <!-- Image Count -->
    <p class="image-count">Showing {{ paginatedImages.length }} of {{ filteredImages.length }} photos</p>

    <!-- Gallery Grid -->
    <div class="gallery-grid">
      <div class="gallery-item" *ngFor="let image of paginatedImages; let i = index"
           (click)="openLightbox(i)">
        <img [src]="image.src" [alt]="image.alt" loading="lazy">
        <div class="gallery-item-overlay">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
            <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">
        &laquo; Prev
      </button>
      <button *ngFor="let p of pages" class="page-btn" [class.active]="p === currentPage"
              (click)="goToPage(p)">{{ p }}</button>
      <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">
        Next &raquo;
      </button>
    </div>

  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" *ngIf="lightboxOpen" (click)="closeLightbox()">

  <!-- Toolbar -->
  <div class="lightbox-toolbar" (click)="$event.stopPropagation()">
    <span class="lightbox-counter">{{ lightboxIndex + 1 }} / {{ filteredImages.length }}</span>
    <div class="lightbox-actions">
      <button (click)="zoomOut($event)" [disabled]="zoomLevel <= 1" title="Zoom out">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zM13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"/><path d="M10.344 11.742c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1 6.538 6.538 0 0 1-1.398 1.4z"/><path d="M3 6.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"/></svg>
      </button>
      <button (click)="zoomIn($event)" [disabled]="zoomLevel >= 3" title="Zoom in">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zM13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"/><path d="M10.344 11.742c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1 6.538 6.538 0 0 1-1.398 1.4z"/><path d="M6.5 3a.5.5 0 0 1 .5.5V6h2.5a.5.5 0 0 1 0 1H7v2.5a.5.5 0 0 1-1 0V7H3.5a.5.5 0 0 1 0-1H6V3.5a.5.5 0 0 1 .5-.5z"/></svg>
      </button>
      <button (click)="closeLightbox()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16"><path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854z"/></svg>
      </button>
    </div>
  </div>

  <!-- Prev / Next -->
  <button class="lightbox-nav lightbox-prev" (click)="lightboxPrev($event)" title="Previous">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
  </button>
  <button class="lightbox-nav lightbox-next" (click)="lightboxNext($event)" title="Next">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
  </button>

  <!-- Image -->
  <div class="lightbox-image-wrap" (click)="$event.stopPropagation()"
       (mousedown)="onDragStart($event)" (mousemove)="onDragMove($event)" (mouseup)="onDragEnd()"
       (mouseleave)="onDragEnd()">
    <img [src]="lightboxImage.src" [alt]="lightboxImage.alt"
         [style.transform]="'scale(' + zoomLevel + ') translate(' + dragX/zoomLevel + 'px,' + dragY/zoomLevel + 'px)'"
         [class.zoomed]="zoomLevel > 1">
  </div>

  <!-- Caption -->
  <div class="lightbox-caption" (click)="$event.stopPropagation()">
    {{ lightboxImage.category }}
  </div>
</div>
