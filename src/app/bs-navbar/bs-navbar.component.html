<header [class.scrolled]="isScrolled" [class.nav-open]="!isMenuCollapsed">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" routerLink="" (click)="closeMenu()">
        <img src="/assets/school_logo.png" alt="Alok Central School" class="brand-logo">
      </a>
      <button class="navbar-toggler" type="button"
              (click)="isMenuCollapsed = !isMenuCollapsed"
              [attr.aria-expanded]="!isMenuCollapsed"
              aria-label="Toggle navigation">
        <span class="toggler-bar"></span>
        <span class="toggler-bar"></span>
        <span class="toggler-bar"></span>
      </button>

      <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="" routerLinkActive="active-link"
               [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
          </li>

          <li class="nav-item has-dropdown" (click)="toggleAboutSubmenu($event)">
            <a class="nav-link dropdown-toggle-custom">About</a>
            <ul class="dropdown-menu-custom" [class.open]="isAboutSubmenuOpen">
              <li><a routerLink="about" (click)="closeMenu()">School Info</a></li>
              <li><a routerLink="result" (click)="closeMenu()">10th Board Results</a></li>
            </ul>
          </li>

          <li class="nav-item has-dropdown" (click)="toggleAdmissionsSubmenu($event)">
            <a class="nav-link dropdown-toggle-custom">Admissions</a>
            <ul class="dropdown-menu-custom" [class.open]="isAdmissionsSubmenuOpen">
              <li><a routerLink="admission" (click)="closeMenu()">CBSE Admissions</a></li>
              <li><a routerLink="admission" (click)="closeMenu()">RBSE Admissions</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="services" routerLinkActive="active-link" (click)="closeMenu()">Facilities</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="gallery" routerLinkActive="active-link" (click)="closeMenu()">Gallery</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="videos" routerLinkActive="active-link" (click)="closeMenu()">Videos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="contact" routerLinkActive="active-link" (click)="closeMenu()">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="cbse" routerLinkActive="active-link" (click)="closeMenu()">CBSE</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
