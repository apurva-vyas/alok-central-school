<section class="login-section section-padding">
  <div class="site-container">
    <h1 class="page-title" appReveal="fade-up">Admin Login</h1>
    <div class="login-form-wrap">
      <div class="login-card card-custom" appReveal="scale-up" [revealDelay]="150">
        <form (ngSubmit)="onSubmit()" class="login-form" novalidate>
          <p *ngIf="errorMessage" class="login-error" role="alert">{{ errorMessage }}</p>

          <div class="login-field">
            <label for="login-email">Email</label>
            <input
              id="login-email"
              type="email"
              name="email"
              [(ngModel)]="email"
              autocomplete="email"
              [disabled]="loading"
              class="login-input"
            />
          </div>

          <div class="login-field">
            <label for="login-password">Password</label>
            <input
              id="login-password"
              type="password"
              name="password"
              [(ngModel)]="password"
              autocomplete="current-password"
              [disabled]="loading"
              class="login-input"
            />
          </div>

          <button type="submit" class="login-submit" [disabled]="loading">
            LOGIN
          </button>

          <p *ngIf="loading" class="login-loading">
            <span class="login-spinner" aria-hidden="true"></span>
            Signing in…
          </p>
        </form>
      </div>
    </div>
  </div>
</section>
