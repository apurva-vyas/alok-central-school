<div class="hero-carousel">
  <ngb-carousel #carousel [interval]="4000" [pauseOnHover]="pauseOnHover"
                [pauseOnFocus]="pauseOnFocus" (slide)="onSlide($event)"
                [showNavigationIndicators]="true" [showNavigationArrows]="true">

    <ng-template ngbSlide>
      <div class="slide-wrapper">
        <img [src]="images[0]" alt="Alok Central School Campus" />
        <div class="slide-overlay"></div>
        <div class="slide-content">
          <h1>Welcome to Alok Central School</h1>
          <p>Empowering students with knowledge, skills, and values for a brighter future.</p>
          <a routerLink="about" class="btn-primary-custom">Discover More</a>
        </div>
      </div>
    </ng-template>

    <ng-template ngbSlide>
      <div class="slide-wrapper">
        <img [src]="images[1]" alt="School Building" />
        <div class="slide-overlay"></div>
        <div class="slide-content">
          <h1>Excellence in Education</h1>
          <p>Nurturing critical thinkers and lifelong learners since 2002.</p>
          <a routerLink="services" class="btn-primary-custom">Our Facilities</a>
        </div>
      </div>
    </ng-template>

  </ngb-carousel>
</div>
