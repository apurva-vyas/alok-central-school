<app-page-hero [image]="heroImage" title="10th Board Results"></app-page-hero>

<section class="result-section section-padding">
  <div class="site-container">
    <p class="section-subtitle">Our students consistently achieve excellent results. View the board examination results below.</p>
    <div class="result-gallery">
      <div class="result-item card-custom" *ngFor="let img of images">
        <img [src]="img" alt="Board Result" loading="lazy">
      </div>
    </div>
  </div>
</section>
