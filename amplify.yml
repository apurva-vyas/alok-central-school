version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev
    build:
      commands:
        - npm run build -- --configuration=production
  artifacts:
    baseDirectory: dist/hello
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: 'index.html'
      headers:
        - key: Cache-Control
          value: 'no-cache, no-store, must-revalidate'
backend:
  phases:
    preBuild:
      commands:
        - (cd server && npm ci --include=dev)
    build:
      commands:
        - (cd server && npx prisma generate && npm run build)
  artifacts:
    baseDirectory: server/dist
    files:
      - '**/*'
