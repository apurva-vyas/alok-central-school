version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/hello
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
backend:
  phases:
    preBuild:
      commands:
        - cd server && npm ci
    build:
      commands:
        - cd server && npx prisma generate && npm run build
  artifacts:
    baseDirectory: server/dist
    files:
      - '**/*'
